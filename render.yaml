services:
  - type: web
    name: internova-backend-api
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: python manage.py migrate --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: internova-backend-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://internova-frontend.vercel.app
      - key: CSRF_TRUSTED_ORIGINS
        value: https://internova-frontend.vercel.app
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_TOKEN_LIFETIME_MINUTES
        value: 60
      - key: JWT_REFRESH_TOKEN_LIFETIME_DAYS
        value: 7
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_STORAGE_BUCKET_NAME
        value: internova-media
      - key: AWS_S3_REGION_NAME
        sync: false
      - key: AWS_S3_ENDPOINT_URL
        sync: false
      - key: AWS_S3_CUSTOM_DOMAIN
        value: ""
      - key: SECURE_SSL_REDIRECT
        value: true
      - key: SECURE_HSTS_SECONDS
        value: 31536000
      - key: SECURE_HSTS_INCLUDE_SUBDOMAINS
        value: true
      - key: SECURE_HSTS_PRELOAD
        value: false
